[build]
  publish = "public"
  command = ""

[functions]
  directory = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Legacy cache rules (paths not in index-only deploy; harmless if unused)
[[headers]]
  for = "/entities/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/chapters/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/word_index/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
